
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전설의 대장장이: 아이언 & 파이어</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #1a1a1a;
            color: #e5e5e5;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, .font-display {
            font-family: 'Black Han Sans', sans-serif;
        }

        /* Lava Background Animation */
        @keyframes lava-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .bg-lava {
            background: linear-gradient(-45deg, #3f0e0e, #7f1d1d, #450a0a, #1c1917);
            background-size: 400% 400%;
            animation: lava-flow 15s ease infinite;
        }

        /* Spark Particles */
        @keyframes fly-spark {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #facc15;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px #f59e0b;
            animation: fly-spark 0.8s ease-out forwards;
        }

        /* Hammer Hit Effect */
        @keyframes hit-shake {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(0.95) rotate(-2deg); }
            50% { transform: scale(1.05) rotate(2deg); }
            75% { transform: scale(0.98) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .hit-anim {
            animation: hit-shake 0.15s ease-in-out;
        }

        /* Floating Text */
        @keyframes floatUpFade {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        }
        .float-text {
            animation: floatUpFade 0.8s ease-out forwards;
            position: absolute;
            pointer-events: none;
            z-index: 50;
            text-shadow: 2px 2px 0px #000;
        }

        /* Glow Pulse */
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
        }
        .glow-box {
            animation: glow-pulse 2s infinite;
        }

        /* Progress Bar Shine */
        .progress-shine {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            background-size: 200% 100%;
            animation: shine 1s infinite linear;
        }
        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #292524; }
        ::-webkit-scrollbar-thumb { background: #78350f; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root" class="w-full h-screen overflow-hidden relative bg-lava"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- GAME DATA ---
        const WEAPONS = [
            { id: 'dagger', name: '녹슨 단검', basePrice: 50, maxHp: 10, icon: '🗡️' },
            { id: 'sword', name: '강철 롱소드', basePrice: 250, maxHp: 25, icon: '⚔️' },
            { id: 'axe', name: '전투 도끼', basePrice: 800, maxHp: 50, icon: '🪓' },
            { id: 'hammer', name: '워해머', basePrice: 2500, maxHp: 100, icon: '🔨' },
            { id: 'magic_sword', name: '마법 검', basePrice: 8000, maxHp: 250, icon: '🔮' },
            { id: 'excalibur', name: '엑스칼리버', basePrice: 30000, maxHp: 600, icon: '👑' },
            { id: 'dragon_slayer', name: '드래곤 슬레이어', basePrice: 100000, maxHp: 1500, icon: '🐲' },
        ];

        const UPGRADES = [
            { id: 'hammer_power', name: '미스릴 망치', baseCost: 100, desc: '클릭 당 단조력 +1', type: 'CLICK', val: 1 },
            { id: 'auto_goblin', name: '고블린 조수', baseCost: 500, desc: '초당 자동 단조 +2', type: 'AUTO', val: 2 },
            { id: 'furnace', name: '용암 화로', baseCost: 1500, desc: '판매 가격 +20%', type: 'PROFIT', val: 0.2 },
            { id: 'skill_crit', name: '정밀 타격', baseCost: 5000, desc: '크리티컬 확률 +5%', type: 'CRIT', val: 5 },
            { id: 'mastery', name: '대장장이의 혼', baseCost: 20000, desc: '모든 효율 1.5배', type: 'ALL', val: 1.5 },
        ];

        // --- COMPONENTS ---

        // Spark Effect Component
        const Sparks = ({ sparks }) => {
            return (
                <>
                    {sparks.map(spark => (
                        <div 
                            key={spark.id}
                            className="spark"
                            style={{
                                left: spark.x,
                                top: spark.y,
                                '--tx': `${spark.tx}px`,
                                '--ty': `${spark.ty}px`,
                                background: spark.color
                            }}
                        />
                    ))}
                </>
            );
        };

        const App = () => {
            // Game State
            const [gold, setGold] = useState(0);
            const [weaponIdx, setWeaponIdx] = useState(0);
            const [progress, setProgress] = useState(0); // Current HP damage to weapon
            const [upgrades, setUpgrades] = useState(UPGRADES.map(u => ({...u, level: 0})));
            
            // Visual State
            const [sparks, setSparks] = useState([]);
            const [floatingTexts, setFloatingTexts] = useState([]);
            const [isHit, setIsHit] = useState(false);
            const [combo, setCombo] = useState(0);
            const comboTimerRef = useRef(null);

            // Stats
            const currentWeapon = WEAPONS[weaponIdx];
            const clickPower = 1 + (upgrades.find(u => u.id === 'hammer_power').level * 1.5);
            const autoPower = upgrades.find(u => u.id === 'auto_goblin').level * 3;
            const profitMult = 1 + (upgrades.find(u => u.id === 'furnace').level * 0.2);
            const critChance = upgrades.find(u => u.id === 'skill_crit').level * 5;
            const mastery = 1 + (upgrades.find(u => u.id === 'mastery').level * 0.5);

            // Calculated
            const finalClickPower = clickPower * mastery;
            const finalAutoPower = autoPower * mastery;

            // Helpers
            const addSpark = (x, y, amount = 5) => {
                const newSparks = [];
                for(let i=0; i<amount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 50 + Math.random() * 100;
                    newSparks.push({
                        id: Date.now() + Math.random(),
                        x, y,
                        tx: Math.cos(angle) * dist,
                        ty: Math.sin(angle) * dist - 50, // Slightly up
                        color: Math.random() > 0.7 ? '#ffffff' : '#f59e0b'
                    });
                }
                setSparks(prev => [...prev, ...newSparks]);
                setTimeout(() => {
                    setSparks(prev => prev.slice(amount));
                }, 800);
            };

            const addFloatingText = (x, y, text, color = 'text-white', size = 'text-2xl') => {
                const id = Date.now() + Math.random();
                setFloatingTexts(prev => [...prev, { id, x, y, text, color, size }]);
                setTimeout(() => {
                    setFloatingTexts(prev => prev.filter(t => t.id !== id));
                }, 800);
            };

            const completeWeapon = () => {
                // Reward
                const earnings = Math.floor(currentWeapon.basePrice * profitMult * mastery);
                setGold(g => g + earnings);
                
                // Visuals
                addFloatingText(window.innerWidth/2, window.innerHeight/2 - 100, `+${earnings.toLocaleString()} G`, 'text-yellow-400', 'text-4xl');
                
                // Progression logic
                if (weaponIdx < WEAPONS.length - 1) {
                    // Simple logic: every 5 crafts, unlock next weapon tier (simulated)
                    // For this demo, let's just say chance to upgrade or based on gold accumulation?
                    // Let's stick to: if you have enough money for next upgrade, maybe show hint.
                    // Actually, let's auto-upgrade weapon tier if you have crafted X times?
                    // For simplicity: Manual button to "Next Level Area" or just cycle?
                    // Let's keep it simple: If you crafted 10 times, unlock next.
                }
                setProgress(0);
            };

            // Weapon Unlock Check
            const craftedCountRef = useRef(0);
            const checkWeaponUnlock = () => {
                craftedCountRef.current += 1;
                if (craftedCountRef.current >= 5 && weaponIdx < WEAPONS.length - 1) {
                    setWeaponIdx(prev => prev + 1);
                    craftedCountRef.current = 0;
                    addFloatingText(window.innerWidth/2, window.innerHeight/3, "NEW WEAPON UNLOCKED!", "text-purple-400", "text-3xl");
                }
            };

            // Hit Logic
            const hit = (power, x, y, isAuto = false) => {
                let damage = power;
                let isCrit = false;

                // Crit check
                if (!isAuto && Math.random() * 100 < critChance) {
                    damage *= 2;
                    isCrit = true;
                }

                setProgress(prev => {
                    const next = prev + damage;
                    if (next >= currentWeapon.maxHp) {
                        completeWeapon();
                        if (!isAuto) checkWeaponUnlock();
                        return 0;
                    }
                    return next;
                });

                if (!isAuto) {
                    // Visuals for click
                    setIsHit(true);
                    setTimeout(() => setIsHit(false), 100);
                    addSpark(x, y);
                    
                    const text = isCrit ? "CRITICAL!" : `+${Math.floor(damage)}`;
                    const color = isCrit ? "text-red-500" : "text-orange-200";
                    addFloatingText(x, y - 50, text, color, isCrit ? "text-3xl font-bold" : "text-xl");

                    // Combo
                    setCombo(c => c + 1);
                    if (comboTimerRef.current) clearTimeout(comboTimerRef.current);
                    comboTimerRef.current = setTimeout(() => setCombo(0), 2000);
                }
            };

            // Auto Loop
            useEffect(() => {
                if (finalAutoPower <= 0) return;
                const interval = setInterval(() => {
                    hit(finalAutoPower / 10, window.innerWidth/2, window.innerHeight/2, true);
                }, 100);
                return () => clearInterval(interval);
            }, [finalAutoPower, weaponIdx, profitMult]); // Deps needed for calculation inside hit logic closure if not using refs

            // UseRefs for stable closures in interval if needed, but state updates are functional so okay.
            // Re-creating interval on dependency change is fine for this scale.

            const handleAnvilClick = (e) => {
                hit(finalClickPower, e.clientX, e.clientY);
            };

            const buyUpgrade = (idx) => {
                const u = upgrades[idx];
                const cost = Math.floor(u.baseCost * Math.pow(1.6, u.level));
                if (gold >= cost) {
                    setGold(g => g - cost);
                    setUpgrades(prev => {
                        const next = [...prev];
                        next[idx].level += 1;
                        return next;
                    });
                    addFloatingText(window.innerWidth/2, window.innerHeight - 200, "UPGRADED!", "text-green-400");
                }
            };

            return (
                <div className="w-full h-full flex flex-col relative text-white">
                    
                    {/* HEADER */}
                    <div className="z-20 p-4 flex justify-between items-start bg-gradient-to-b from-black/80 to-transparent h-24">
                        <div>
                            <h1 className="text-3xl text-orange-500 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] font-display">
                                아이언 & 파이어
                            </h1>
                            <div className="text-xs text-gray-400">전설의 대장장이</div>
                        </div>
                        <div className="text-right">
                            <div className="text-3xl font-bold text-yellow-400 font-mono drop-shadow-md">
                                {Math.floor(gold).toLocaleString()} G
                            </div>
                            <div className="text-sm text-orange-300">
                                초당 제작: {finalAutoPower.toFixed(1)} / 클릭: {finalClickPower.toFixed(1)}
                            </div>
                        </div>
                    </div>

                    {/* MAIN GAME AREA */}
                    <div className="flex-1 relative flex flex-col items-center justify-center perspective-1000">
                        
                        {/* Combo Counter */}
                        {combo > 1 && (
                            <div className="absolute top-10 text-4xl font-black italic text-red-500 animate-bounce drop-shadow-lg z-10">
                                {combo} COMBO!
                            </div>
                        )}

                        {/* Weapon Display */}
                        <div className="mb-8 relative">
                            <div className="text-8xl filter drop-shadow-[0_0_20px_rgba(255,165,0,0.6)] transform transition-all duration-300 hover:scale-110">
                                {currentWeapon.icon}
                            </div>
                            <div className="text-center mt-4 font-bold text-xl text-orange-200">
                                {currentWeapon.name} <span className="text-sm text-gray-500">(Lv.{weaponIdx + 1})</span>
                            </div>
                        </div>

                        {/* Progress Bar */}
                        <div className="w-64 h-6 bg-gray-800 rounded-full border-2 border-gray-600 relative overflow-hidden shadow-inner mb-12">
                            <div 
                                className="h-full bg-gradient-to-r from-orange-600 to-yellow-500 transition-all duration-100 ease-out relative"
                                style={{ width: `${(progress / currentWeapon.maxHp) * 100}%` }}
                            >
                                <div className="absolute inset-0 progress-shine"></div>
                            </div>
                            <div className="absolute inset-0 flex items-center justify-center text-xs font-bold text-white drop-shadow-md">
                                {Math.floor(progress)} / {currentWeapon.maxHp}
                            </div>
                        </div>

                        {/* ANVIL (Click Area) */}
                        <div 
                            className={`
                                relative cursor-pointer active:scale-95 transition-transform
                                ${isHit ? 'hit-anim' : 'floating'}
                            `}
                            onMouseDown={handleAnvilClick}
                            onTouchStart={(e) => {
                                e.preventDefault(); // prevent zoom
                                handleAnvilClick(e.touches[0]);
                            }}
                        >
                            {/* Anvil Graphic (CSS Art or Emoji) */}
                            <div className="w-48 h-32 bg-gray-700 rounded-lg relative shadow-[0_10px_30px_rgba(0,0,0,0.5)] border-b-8 border-gray-900 flex items-center justify-center glow-box">
                                <div className="text-6xl pointer-events-none">⬛</div>
                                {/* Decorative details */}
                                <div className="absolute top-0 w-full h-4 bg-gray-600 rounded-t-lg"></div>
                                <div className="absolute -bottom-8 w-32 h-8 bg-gray-800 rounded-b-lg"></div>
                            </div>
                            
                            {/* Helper Text */}
                            <div className="absolute -bottom-16 left-0 right-0 text-center text-gray-400 animate-pulse text-sm">
                                터치해서 단조하기
                            </div>
                        </div>

                        {/* Particles Layer */}
                        <div className="absolute inset-0 pointer-events-none overflow-hidden">
                            <Sparks sparks={sparks} />
                            {floatingTexts.map(ft => (
                                <div 
                                    key={ft.id} 
                                    className={`float-text font-display ${ft.color} ${ft.size}`} 
                                    style={{ left: ft.x, top: ft.y }}
                                >
                                    {ft.text}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* UPGRADE PANEL */}
                    <div className="h-2/5 bg-neutral-900 border-t-4 border-neutral-800 flex flex-col z-30 shadow-[0_-10px_50px_rgba(0,0,0,0.8)]">
                        <div className="p-2 bg-neutral-800 text-center font-bold text-orange-500 border-b border-neutral-700 text-sm uppercase tracking-widest">
                            대장간 업그레이드
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 grid grid-cols-1 gap-3 pb-safe">
                            {upgrades.map((u, idx) => {
                                const cost = Math.floor(u.baseCost * Math.pow(1.6, u.level));
                                const canAfford = gold >= cost;

                                return (
                                    <button 
                                        key={u.id}
                                        onClick={() => buyUpgrade(idx)}
                                        disabled={!canAfford}
                                        className={`
                                            flex items-center p-3 rounded-lg border-2 transition-all
                                            ${canAfford 
                                                ? 'bg-neutral-800 border-neutral-700 hover:border-orange-500 hover:bg-neutral-750' 
                                                : 'bg-neutral-900 border-neutral-800 opacity-50 grayscale'
                                            }
                                        `}
                                    >
                                        <div className="w-12 h-12 bg-black/30 rounded flex items-center justify-center text-2xl mr-4 border border-white/5">
                                            {u.id === 'hammer_power' && '⚒️'}
                                            {u.id === 'auto_goblin' && '👺'}
                                            {u.id === 'furnace' && '🔥'}
                                            {u.id === 'skill_crit' && '🎯'}
                                            {u.id === 'mastery' && '📜'}
                                        </div>
                                        <div className="flex-1 text-left">
                                            <div className="flex justify-between text-orange-100 font-bold">
                                                <span>{u.name}</span>
                                                <span className="text-xs bg-orange-900/50 px-2 py-0.5 rounded text-orange-300">Lv.{u.level}</span>
                                            </div>
                                            <div className="text-xs text-gray-400 mt-1">{u.desc}</div>
                                        </div>
                                        <div className={`ml-4 font-mono font-bold ${canAfford ? 'text-yellow-400' : 'text-gray-600'}`}>
                                            {cost.toLocaleString()} G
                                        </div>
                                    </button>
                                )
                            })}
                            {/* Padding for scroll */}
                            <div className="h-12"></div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
