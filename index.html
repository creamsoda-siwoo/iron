
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전설의 대장장이: 신의 전쟁</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #050505;
            color: #e5e5e5;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3, .font-display {
            font-family: 'Black Han Sans', sans-serif;
        }
        .font-game {
            font-family: 'Do Hyeon', sans-serif;
        }

        /* Backgrounds */
        .bg-lava-gradient { background: radial-gradient(circle at 50% 30%, #2a0a0a 0%, #000000 100%); }
        .bg-dungeon-gradient { background: radial-gradient(circle at 50% 20%, #0f172a 0%, #020617 100%); }
        .bg-gacha-gradient { background: radial-gradient(circle at 50% 40%, #312e81 0%, #0f0c29 100%); }
        .bg-inv-gradient { background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%); }
        .bg-tower-gradient { background: radial-gradient(circle at 50% 20%, #4c1d95 0%, #000000 100%); }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(30,30,30,0.9), rgba(15,15,15,0.95));
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Animations */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake-anim { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.1); opacity: 0; }
        }
        .float-text { animation: float-up 0.8s ease-out forwards; pointer-events: none; position: absolute; z-index: 100; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
            50% { box-shadow: 0 0 30px rgba(234, 179, 8, 0.4); }
        }

        @keyframes god-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.2), inset 0 0 20px rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.6), inset 0 0 40px rgba(255,255,255,0.3); border-color: #fff; }
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(200%) rotate(45deg); }
        }
        .shine-effect { position: relative; overflow: hidden; }
        .shine-effect::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%); animation: shine 2s infinite;
        }

        @keyframes anvil-hit {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .anvil-anim:active { animation: anvil-hit 0.1s; }

        /* Rarity Styles */
        .rarity-C { border-color: #737373; color: #d4d4d4; box-shadow: inset 0 0 5px rgba(115,115,115,0.2); }
        .rarity-B { border-color: #3b82f6; color: #60a5fa; box-shadow: inset 0 0 8px rgba(59,130,246,0.2); }
        .rarity-A { border-color: #a855f7; color: #c084fc; box-shadow: inset 0 0 10px rgba(168,85,247,0.2); }
        .rarity-S { border-color: #f59e0b; color: #fbbf24; box-shadow: inset 0 0 12px rgba(245,158,11,0.3); background: linear-gradient(45deg, rgba(245,158,11,0.1), transparent); }
        .rarity-SS { border-color: #ef4444; color: #f87171; box-shadow: 0 0 15px rgba(239,68,68,0.4), inset 0 0 20px rgba(239,68,68,0.2); background: linear-gradient(45deg, rgba(220,38,38,0.2), rgba(0,0,0,0.8)); animation: pulse-glow 2s infinite; }
        .rarity-SSS { 
            border-color: #fff; color: #fff; 
            background: linear-gradient(135deg, #000 0%, #434343 50%, #000 100%);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: god-glow 3s infinite;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root" class="w-full h-screen overflow-hidden relative bg-black max-w-md mx-auto border-x border-white/5 shadow-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONSTANTS ---
        const WEAPONS = [
            { id: 'w1', name: '수련용 검', basePrice: 100, damage: 10, maxHp: 20, icon: '🗡️' },
            { id: 'w2', name: '강철 메이스', basePrice: 500, damage: 35, maxHp: 50, icon: '🔨' },
            { id: 'w3', name: '미스릴 도끼', basePrice: 2500, damage: 120, maxHp: 150, icon: '🪓' },
            { id: 'w4', name: '화염의 지팡이', basePrice: 12000, damage: 450, maxHp: 400, icon: '🔥' },
            { id: 'w5', name: '용살자의 대검', basePrice: 60000, damage: 1800, maxHp: 1000, icon: '🐲' },
            { id: 'w6', name: '천상의 활', basePrice: 350000, damage: 8000, maxHp: 3000, icon: '🏹' },
            { id: 'w7', name: '공허의 낫', basePrice: 2000000, damage: 35000, maxHp: 8000, icon: '💀' },
        ];

        const HERO_POOL = [
            // C Rank
            { id: 'h1', name: '징집병', rarity: 'C', job: 'Warrior', baseDps: 5, growth: 1.2, icon: '👮' },
            { id: 'h2', name: '견습 마법사', rarity: 'C', job: 'Mage', baseDps: 6, growth: 1.2, icon: '🧙‍♂️' },
            { id: 'h3', name: '좀도둑', rarity: 'C', job: 'Rogue', baseDps: 7, growth: 1.2, icon: '👺' },
            { id: 'h4', name: '신관', rarity: 'C', job: 'Cleric', baseDps: 4, growth: 1.2, icon: '🧖' },
            // B Rank
            { id: 'h5', name: '마을 경비', rarity: 'B', job: 'Tank', baseDps: 15, growth: 1.4, icon: '🛡️' },
            { id: 'h6', name: '숙련된 궁수', rarity: 'B', job: 'Archer', baseDps: 18, growth: 1.4, icon: '🏹' },
            { id: 'h7', name: '야만전사', rarity: 'B', job: 'Barbarian', baseDps: 20, growth: 1.4, icon: '🪓' },
            { id: 'h8', name: '음유시인', rarity: 'B', job: 'Bard', baseDps: 14, growth: 1.4, icon: '🎻' },
            // A Rank
            { id: 'h9', name: '왕실 기사', rarity: 'A', job: 'Knight', baseDps: 50, growth: 1.6, icon: '🤺' },
            { id: 'h10', name: '전투 사제', rarity: 'A', job: 'Priest', baseDps: 45, growth: 1.6, icon: '⛪' },
            { id: 'h11', name: '팔라딘', rarity: 'A', job: 'Paladin', baseDps: 55, growth: 1.6, icon: '✨' },
            { id: 'h12', name: '숲의 파수꾼', rarity: 'A', job: 'Ranger', baseDps: 52, growth: 1.6, icon: '🍃' },
            // S Rank
            { id: 'h13', name: '대마법사', rarity: 'S', job: 'Archmage', baseDps: 200, growth: 2.0, icon: '🔮' },
            { id: 'h14', name: '암살자', rarity: 'S', job: 'Assassin', baseDps: 220, growth: 2.0, icon: '🗡️' },
            { id: 'h15', name: '다크 나이트', rarity: 'S', job: 'DarkKnight', baseDps: 230, growth: 2.0, icon: '🦇' },
            { id: 'h16', name: '흑마법사', rarity: 'S', job: 'Warlock', baseDps: 210, growth: 2.0, icon: '💀' },
            // SS Rank
            { id: 'h17', name: '소드마스터', rarity: 'SS', job: 'Legend', baseDps: 1000, growth: 3.0, icon: '👑' },
            { id: 'h18', name: '발키리', rarity: 'SS', job: 'God', baseDps: 1100, growth: 3.0, icon: '👼' },
            // SSS Rank
            { id: 'h19', name: '제우스', rarity: 'SSS', job: 'Sky God', baseDps: 5000, growth: 4.0, icon: '⚡' },
            { id: 'h20', name: '하데스', rarity: 'SSS', job: 'Death God', baseDps: 5500, growth: 4.0, icon: '🔥' },
            { id: 'h21', name: '포세이돈', rarity: 'SSS', job: 'Sea God', baseDps: 5200, growth: 4.0, icon: '🌊' },
        ];

        const ARTIFACT_POOL = [
            { id: 'a1', name: '녹슨 동전', rarity: 'C', desc: '골드 획득량 +10%', type: 'GOLD', val: 0.1 },
            { id: 'a2', name: '부러진 칼날', rarity: 'C', desc: '영웅 공격력 +10%', type: 'DPS', val: 0.1 },
            { id: 'a3', name: '행운의 부적', rarity: 'B', desc: '제작 대성공 확률 +5%', type: 'LUCK', val: 0.05 },
            { id: 'a4', name: '황금 성배', rarity: 'A', desc: '골드 획득량 +50%', type: 'GOLD', val: 0.5 },
            { id: 'a5', name: '용기의 깃발', rarity: 'S', desc: '영웅 공격력 +100%', type: 'DPS', val: 1.0 },
            { id: 'a6', name: '현자의 돌', rarity: 'SS', desc: '모든 능력치 +200%', type: 'ALL', val: 2.0 },
        ];

        const SKILL_DEFS = {
            SMITE: { id: 'SMITE', name: '천벌', icon: '⚡', cd: 30000, dur: 0, color: 'bg-blue-600', desc: '즉시 클릭 데미지의 100배' },
            BERSERK: { id: 'BERSERK', name: '광폭화', icon: '😡', cd: 60000, dur: 15000, color: 'bg-red-600', desc: '15초간 파티 DPS 2배' },
            GOLD: { id: 'GOLD', name: '황금광', icon: '💰', cd: 90000, dur: 15000, color: 'bg-yellow-600', desc: '15초간 골드 획득 2배' },
        };

        const MASTERY_DEFS = [
            { id: 'HAMMER', name: '망치 숙련', icon: '🔨', baseCost: 5000, desc: '클릭 데미지 증가', val: 0.2 },
            { id: 'HAGGLE', name: '상술 연마', icon: '⚖️', baseCost: 5000, desc: '판매 가격 증가', val: 0.1 },
            { id: 'LEADERSHIP', name: '지휘력', icon: '🚩', baseCost: 5000, desc: '파티 DPS 증가', val: 0.1 },
        ];

        const MONSTERS = ['🐀', '🦇', '🕷️', '🐺', '👺', '🧟', '💀', '👿', '🐲', '🦑', '👹', '🤖', '👾', '👽', '👻'];
        const BOSS_MONSTERS = ['🦖', '🦍', '🦕', '🐋', '🐉', '🦁', '👹'];
        const TOWER_BOSSES = ['🏰', '🗿', '⚔️', '🛡️', '👁️', '🧛', '🕸️', '🦂', '🦅', '🐉'];

        const formatNum = (num) => {
            if (!num || isNaN(num)) return '0';
            if (num >= 1000000000000) return (num / 1000000000000).toFixed(2) + '조';
            if (num >= 100000000) return (num / 100000000).toFixed(2) + '억';
            if (num >= 10000) return (num / 10000).toFixed(1) + '만';
            return Math.floor(num).toLocaleString();
        };

        const RARITY_CONF = {
            'C': { color: 'text-gray-400', border: 'rarity-C', prob: 0.5, val: 0 },
            'B': { color: 'text-blue-400', border: 'rarity-B', prob: 0.3, val: 1 },
            'A': { color: 'text-purple-400', border: 'rarity-A', prob: 0.15, val: 2 },
            'S': { color: 'text-yellow-400', border: 'rarity-S', prob: 0.04, val: 3 },
            'SS': { color: 'text-red-500', border: 'rarity-SS', prob: 0.01, val: 4 },
            'SSS': { color: 'text-white', border: 'rarity-SSS', prob: 0.001, val: 5 },
        };

        const FloatingTexts = ({ texts }) => (
            <>
                {texts.map(t => (
                    <div key={t.id} className={`float-text font-game ${t.color} ${t.size}`} style={{ left: `${t.x}px`, top: `${t.y}px`, zIndex: 9999 }}>
                        {t.text}
                    </div>
                ))}
            </>
        );

        const App = () => {
            const [tab, setTab] = useState('SMITH'); // SMITH, DUNGEON, INVENTORY, SHOP
            const [shopTab, setShopTab] = useState('HERO'); // HERO, ARTIFACT
            const [dungeonMode, setDungeonMode] = useState('NORMAL'); // NORMAL, RAID, TOWER
            const [gold, setGold] = useState(1000);
            
            const [wpIdx, setWpIdx] = useState(0);
            const [smithHp, setSmithHp] = useState(0);
            const [inventory, setInventory] = useState([]);
            const [clickLv, setClickLv] = useState(1);
            const [autoLv, setAutoLv] = useState(0);
            const [autoSellRank, setAutoSellRank] = useState(-1);
            
            const [ownedHeroes, setOwnedHeroes] = useState([]);
            const [party, setParty] = useState([]);
            const [stage, setStage] = useState(1);
            const [towerFloor, setTowerFloor] = useState(1);
            const [mobHp, setMobHp] = useState(100);
            const [mobMaxHp, setMobMaxHp] = useState(100);
            const [raidBoss, setRaidBoss] = useState(null); // { hp, maxHp, timeLeft, active }

            const [artifacts, setArtifacts] = useState([]);
            const [mastery, setMastery] = useState({ HAMMER: 0, HAGGLE: 0, LEADERSHIP: 0 });

            const [skills, setSkills] = useState({
                SMITE: { lv: 1, lastUsed: 0 },
                BERSERK: { lv: 1, lastUsed: 0 },
                GOLD: { lv: 1, lastUsed: 0 },
            });

            const [texts, setTexts] = useState([]);
            const [shake, setShake] = useState(false);
            const [gachaResult, setGachaResult] = useState(null);
            const [activeBuffs, setActiveBuffs] = useState({ BERSERK: 0, GOLD: 0 }); 
            
            const [selectedItem, setSelectedItem] = useState(null);
            const [itemSource, setItemSource] = useState(null); 
            const [isEquipMode, setIsEquipMode] = useState(false);
            const [showMastery, setShowMastery] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [now, setNow] = useState(Date.now());

            // --- SAVE/LOAD LOGIC ---
            const stateRef = useRef({}); // Ref to hold current state for auto-save

            // Update ref on render
            useEffect(() => {
                stateRef.current = {
                    gold, wpIdx, clickLv, autoLv, autoSellRank,
                    inventory, ownedHeroes, party, stage, towerFloor,
                    artifacts, mastery, skills
                };
            }, [gold, wpIdx, clickLv, autoLv, autoSellRank, inventory, ownedHeroes, party, stage, towerFloor, artifacts, mastery, skills]);

            const saveGame = (manual = false) => {
                try {
                    localStorage.setItem('BS_WAR_V1', JSON.stringify(stateRef.current));
                    if (manual) addText(window.innerWidth/2, window.innerHeight/2, "저장되었습니다!", "text-green-400 font-bold");
                } catch (e) {
                    console.error("Save failed", e);
                }
            };

            const loadGame = () => {
                try {
                    const saved = localStorage.getItem('BS_WAR_V1');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if(data.gold !== undefined) setGold(data.gold);
                        if(data.wpIdx !== undefined) setWpIdx(data.wpIdx);
                        if(data.clickLv !== undefined) setClickLv(data.clickLv);
                        if(data.autoLv !== undefined) setAutoLv(data.autoLv);
                        if(data.autoSellRank !== undefined) setAutoSellRank(data.autoSellRank);
                        if(data.inventory) setInventory(data.inventory);
                        if(data.ownedHeroes) setOwnedHeroes(data.ownedHeroes);
                        if(data.party) setParty(data.party);
                        if(data.stage) {
                            setStage(data.stage);
                            setMobMaxHp(Math.floor(100 * Math.pow(1.35, data.stage)));
                            setMobHp(Math.floor(100 * Math.pow(1.35, data.stage)));
                        }
                        if(data.towerFloor) setTowerFloor(data.towerFloor);
                        if(data.artifacts) setArtifacts(data.artifacts);
                        if(data.mastery) setMastery(data.mastery);
                        if(data.skills) setSkills(data.skills);
                    }
                } catch (e) {
                    console.error("Load failed", e);
                }
            };

            const resetGame = () => {
                if (confirm("정말 모든 데이터를 초기화하시겠습니까? (복구 불가)")) {
                    localStorage.removeItem('BS_WAR_V1');
                    window.location.reload();
                }
            };

            useEffect(() => {
                loadGame();
                if (ownedHeroes.length === 0) {
                    // This check might run before loadGame finishes in React 18 strict mode logic sometimes, 
                    // but loadGame is synchronous here.
                    // If loadGame found nothing, ownedHeroes is still empty array from useState init.
                    // We need to wait? No, useState update is async.
                    // Actually loadGame calls state setters.
                    // Let's add a safe initialization for starter hero if persistent data didn't have heroes.
                    // But we can't check ownedHeroes immediately after calling loadGame.
                    // We'll rely on a separate effect or just check if loaded data was empty.
                }
                
                // Auto-save every 30s
                const saveTimer = setInterval(() => saveGame(false), 30000);
                const loopTimer = setInterval(() => setNow(Date.now()), 100);
                
                return () => {
                    clearInterval(saveTimer);
                    clearInterval(loopTimer);
                }
            }, []);

            // Ensure starter hero exists if not loaded
            useEffect(() => {
                // If after load (or init) heroes are empty, add starter.
                // Give a small delay or check inside loadGame would be better, but this works for now.
                const t = setTimeout(() => {
                    if (ownedHeroes.length === 0) {
                        const starter = {
                            uid: Date.now(),
                            defId: 'h1',
                            level: 1,
                            awaken: 0,
                            equippedWeapon: null
                        };
                        setOwnedHeroes([starter]);
                        setParty([starter.uid]);
                    }
                }, 100);
                return () => clearTimeout(t);
            }, [ownedHeroes.length]);
            // --- END SAVE/LOAD LOGIC ---

            const currentWp = WEAPONS[wpIdx] || WEAPONS[0];
            
            const artifactEffects = useMemo(() => {
                let eff = { gold: 0, dps: 0, luck: 0 };
                if (!artifacts) return eff;
                artifacts.forEach(a => {
                    const def = ARTIFACT_POOL.find(d => d.id === a.defId);
                    if (!def) return;
                    const mult = 1 + (a.level * 0.1);
                    const val = def.val * mult;
                    if (def.type === 'GOLD' || def.type === 'ALL') eff.gold += val;
                    if (def.type === 'DPS' || def.type === 'ALL') eff.dps += val;
                    if (def.type === 'LUCK' || def.type === 'ALL') eff.luck += val;
                });
                return eff;
            }, [artifacts]);

            const masteryEffects = useMemo(() => {
                return {
                    click: mastery.HAMMER * MASTERY_DEFS[0].val,
                    gold: mastery.HAGGLE * MASTERY_DEFS[1].val,
                    dps: mastery.LEADERSHIP * MASTERY_DEFS[2].val,
                }
            }, [mastery]);

            const clickPower = Math.floor(clickLv * 5 * (1 + artifactEffects.dps) * (1 + masteryEffects.click));
            
            const partyDps = useMemo(() => {
                let dps = 0;
                party.forEach(uid => {
                    const hero = ownedHeroes.find(h => h.uid === uid);
                    if (hero) {
                        const def = HERO_POOL.find(d => d.id === hero.defId);
                        if (def) {
                            let hDps = def.baseDps * Math.pow(def.growth, hero.level - 1) * (1 + hero.awaken * 0.5);
                            if (hero.equippedWeapon) hDps += (hero.equippedWeapon.damage || 0);
                            dps += hDps;
                        }
                    }
                });
                dps = dps * (1 + artifactEffects.dps) * (1 + masteryEffects.dps);
                if (activeBuffs.BERSERK > now) dps *= 2;
                return dps;
            }, [party, ownedHeroes, artifactEffects, activeBuffs.BERSERK, now, masteryEffects]);

            const addText = (x, y, txt, col = 'text-white', sz = 'text-xl') => {
                const id = Math.random();
                setTexts(p => [...p, { id, x, y, text: txt, color: col, size: sz }]);
                setTimeout(() => setTexts(p => p.filter(t => t.id !== id)), 800);
            };

            const triggerShake = () => {
                setShake(true);
                setTimeout(() => setShake(false), 400);
            };

            const hitAnvil = (dmg, isAuto) => {
                if (!isAuto) triggerShake();
                setSmithHp(prev => {
                    const next = prev + dmg;
                    if (next >= currentWp.maxHp) {
                        const luck = Math.random() + artifactEffects.luck;
                        let rarity = 'C';
                        if (luck > 0.995) rarity = 'SSS';
                        else if (luck > 0.98) rarity = 'SS';
                        else if (luck > 0.95) rarity = 'S';
                        else if (luck > 0.85) rarity = 'A';
                        else if (luck > 0.7) rarity = 'B';

                        const newItem = {
                            uid: Math.random(),
                            defId: currentWp.id,
                            name: currentWp.name,
                            rarity,
                            damage: Math.floor(currentWp.damage * (rarity === 'SSS' ? 10 : rarity === 'SS' ? 5 : rarity === 'S' ? 3 : rarity === 'A' ? 2 : rarity === 'B' ? 1.5 : 1)),
                            price: Math.floor(currentWp.basePrice * (rarity === 'SSS' ? 50 : rarity === 'SS' ? 10 : rarity === 'S' ? 5 : 1.2)),
                            upgrade: 0,
                            icon: currentWp.icon
                        };

                        const price = Math.floor(newItem.price * (1 + artifactEffects.gold) * (1 + masteryEffects.gold));

                        if (RARITY_CONF[rarity].val <= autoSellRank) {
                             setGold(g => g + price);
                             if(!isAuto) addText(window.innerWidth/2, window.innerHeight/3, `자동 판매 +${formatNum(price)}G`, 'text-gray-400', 'text-sm');
                        } else {
                            setInventory(prev => [newItem, ...prev].slice(0, 50));
                            if(!isAuto) addText(window.innerWidth/2, window.innerHeight/3, "제작 성공!", RARITY_CONF[rarity].color, 'text-2xl font-bold');
                        }
                        return 0;
                    }
                    return next;
                });
                if (!isAuto) {
                    addText(window.innerWidth/2 + (Math.random()*40-20), window.innerHeight/2, `+${formatNum(dmg)}`, 'text-orange-300');
                }
            };

            const sellItem = (item) => {
                if (!item) return;
                const val = Math.floor(item.price * (1 + artifactEffects.gold) * (1 + masteryEffects.gold));
                setGold(g => g + val);
                setInventory(p => p.filter(i => i.uid !== item.uid));
                addText(window.innerWidth/2, 100, `+${formatNum(val)} G`, 'text-yellow-400 font-bold');
                setSelectedItem(null);
            };

            const upgradeItem = () => {
                if (!selectedItem) return;
                const currentLevel = selectedItem.upgrade || 0;
                const cost = Math.floor(selectedItem.price * 0.5 * (1 + currentLevel * 0.2));
                
                if (gold < cost) {
                    addText(window.innerWidth/2, window.innerHeight/2, "골드 부족!", "text-red-500");
                    return;
                }

                setGold(g => g - cost);
                const newItem = {
                    ...selectedItem,
                    upgrade: currentLevel + 1,
                    damage: Math.floor(selectedItem.damage * 1.2),
                    price: Math.floor(selectedItem.price * 1.1)
                };

                if (itemSource) setOwnedHeroes(prev => prev.map(h => h.uid === itemSource ? { ...h, equippedWeapon: newItem } : h));
                else setInventory(prev => prev.map(i => i.uid === newItem.uid ? newItem : i));
                
                setSelectedItem(newItem);
                addText(window.innerWidth/2, window.innerHeight/2, "강화 성공!", "text-green-400 font-bold text-2xl");
                triggerShake();
            };

            const unequipItem = () => {
                if (!itemSource || !selectedItem) return;
                if (inventory.length >= 50) {
                    addText(window.innerWidth/2, window.innerHeight/2, "가방이 가득 찼습니다!", "text-red-500");
                    return;
                }
                setInventory(prev => [selectedItem, ...prev]);
                setOwnedHeroes(prev => prev.map(h => h.uid === itemSource ? { ...h, equippedWeapon: null } : h));
                setSelectedItem(null);
                setIsEquipMode(false);
                addText(window.innerWidth/2, window.innerHeight/2, "장비 해제됨", "text-gray-400");
            };

            const equipToHero = (heroUid, item) => {
                const targetHero = ownedHeroes.find(h => h.uid === heroUid);
                if (targetHero && targetHero.equippedWeapon) {
                     setInventory(p => [targetHero.equippedWeapon, ...p]);
                }
                setOwnedHeroes(prev => prev.map(h => h.uid === heroUid ? { ...h, equippedWeapon: item } : h));
                setInventory(p => p.filter(i => i.uid !== item.uid));
                setSelectedItem(null);
                setIsEquipMode(false);
                addText(window.innerWidth/2, window.innerHeight/2, "장착 완료!", "text-green-400 font-bold");
            };

            const summonHero = (count = 1) => {
                const COST = 10000 * count;
                if (gold < COST) {
                    addText(window.innerWidth/2, window.innerHeight/2, "골드 부족!", "text-yellow-500");
                    return;
                }
                setGold(g => g - COST);
                
                let lastHero = null;
                for(let i=0; i<count; i++) {
                    const r = Math.random();
                    let rarity = 'C';
                    if (r < 0.001) rarity = 'SSS';
                    else if (r < 0.01) rarity = 'SS';
                    else if (r < 0.05) rarity = 'S';
                    else if (r < 0.20) rarity = 'A';
                    else if (r < 0.50) rarity = 'B';

                    const pool = HERO_POOL.filter(h => h.rarity === rarity);
                    const heroDef = pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : HERO_POOL[0];
                    
                    setOwnedHeroes(prev => {
                        const existing = prev.find(h => h.defId === heroDef.id);
                        if (existing) {
                            return prev.map(h => h.uid === existing.uid ? { ...h, awaken: h.awaken + 1 } : h);
                        } else {
                            return [...prev, { uid: Math.random(), defId: heroDef.id, level: 1, awaken: 0, equippedWeapon: null }];
                        }
                    });
                    lastHero = heroDef;
                }
                setGachaResult({ type: count > 1 ? 'MULTI_HERO' : 'NEW', def: lastHero, count });
            };

            const summonArtifact = (count = 1) => {
                const COST = 5000 * count;
                if (gold < COST) {
                    addText(window.innerWidth/2, window.innerHeight/2, "골드 부족!", "text-yellow-500");
                    return;
                }
                setGold(g => g - COST);

                let lastArt = null;
                for(let i=0; i<count; i++) {
                    const r = Math.random();
                    let rarity = 'C';
                    if (r < 0.01) rarity = 'SS';
                    else if (r < 0.05) rarity = 'S';
                    else if (r < 0.20) rarity = 'A';
                    else if (r < 0.50) rarity = 'B';

                    const pool = ARTIFACT_POOL.filter(a => a.rarity === rarity);
                    const artDef = pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : ARTIFACT_POOL[0];
                    
                    setArtifacts(prev => {
                         const existing = prev.find(a => a.defId === artDef.id);
                         if(existing) {
                             return prev.map(a => a.uid === existing.uid ? { ...a, level: a.level + 1 } : a);
                         } else {
                             return [...prev, { uid: Math.random(), defId: artDef.id, level: 1 }];
                         }
                    });
                    lastArt = artDef;
                }
                setGachaResult({ type: count > 1 ? 'MULTI_ART' : 'ART_NEW', def: lastArt, count });
            };

            const toggleParty = (uid) => {
                if (party.includes(uid)) setParty(p => p.filter(id => id !== uid));
                else if (party.length < 4) setParty(p => [...p, uid]);
                else addText(window.innerWidth/2, window.innerHeight/2, "파티가 꽉 찼습니다!", "text-red-400");
            };

            const levelUpHero = (uid) => {
                const h = ownedHeroes.find(x => x.uid === uid);
                if(!h) return;
                const cost = Math.floor(100 * Math.pow(1.2, h.level));
                if (gold >= cost) {
                    setGold(g => g - cost);
                    setOwnedHeroes(prev => prev.map(hero => hero.uid === uid ? { ...hero, level: hero.level + 1 } : hero));
                }
            };

            const activateSkill = (skillId) => {
                const def = SKILL_DEFS[skillId];
                const skill = skills[skillId];
                if (now - skill.lastUsed < def.cd) {
                    addText(window.innerWidth/2, window.innerHeight/2, "쿨타임 중!", "text-gray-400");
                    return;
                }
                setSkills(prev => ({ ...prev, [skillId]: { ...prev[skillId], lastUsed: now } }));

                if (skillId === 'SMITE') {
                    const dmg = clickPower * 100;
                    if (dungeonMode === 'RAID' && raidBoss && raidBoss.active) {
                        setRaidBoss(prev => prev ? { ...prev, hp: Math.max(0, prev.hp - dmg) } : null);
                    } else if (dungeonMode === 'TOWER') {
                        setMobHp(prev => Math.max(0, prev - dmg));
                    } else {
                        setMobHp(prev => Math.max(0, prev - dmg));
                    }
                    addText(window.innerWidth/2, window.innerHeight/3, `천벌! -${formatNum(dmg)}`, 'text-blue-400 font-bold text-3xl');
                    triggerShake();
                } else {
                    setActiveBuffs(prev => ({ ...prev, [skillId]: now + def.dur }));
                    addText(window.innerWidth/2, window.innerHeight/2, `${def.name} 발동!`, "text-yellow-300 font-bold text-2xl");
                }
            };

            const cycleAutoSell = () => setAutoSellRank(prev => prev >= 2 ? -1 : prev + 1);

            const upgradeMastery = (key) => {
                const cost = Math.floor(MASTERY_DEFS.find(m => m.id === key).baseCost * Math.pow(1.5, mastery[key]));
                if (gold >= cost) {
                    setGold(g => g - cost);
                    setMastery(p => ({...p, [key]: p[key] + 1}));
                    addText(window.innerWidth/2, window.innerHeight/2, "마스터리 강화!", "text-green-400");
                } else {
                    addText(window.innerWidth/2, window.innerHeight/2, "골드 부족!", "text-red-400");
                }
            };

            const startRaid = () => {
                if (dungeonMode !== 'NORMAL') return;
                setDungeonMode('RAID');
                const bossHp = mobMaxHp * 100;
                setRaidBoss({ hp: bossHp, maxHp: bossHp, timeLeft: 30000, active: true, start: Date.now() });
                addText(window.innerWidth/2, window.innerHeight/2, "BOSS RAID START!", "text-red-600 font-bold text-4xl");
            };

            const enterTower = () => {
                if (dungeonMode !== 'NORMAL') return;
                setDungeonMode('TOWER');
                setMobMaxHp(Math.floor(1000 * Math.pow(1.5, towerFloor)));
                setMobHp(Math.floor(1000 * Math.pow(1.5, towerFloor)));
                addText(window.innerWidth/2, window.innerHeight/2, `TOWER FLOOR ${towerFloor}`, "text-purple-400 font-bold text-4xl");
            }

            const exitDungeonMode = () => {
                setDungeonMode('NORMAL');
                setRaidBoss(null);
                setMobMaxHp(Math.floor(100 * Math.pow(1.35, stage)));
                setMobHp(Math.floor(100 * Math.pow(1.35, stage)));
            }

            useEffect(() => {
                const timer = setInterval(() => {
                    // Auto Click
                    if (autoLv > 0) hitAnvil(autoLv * clickPower * 0.2, true);
                    
                    // DPS Logic
                    if (partyDps > 0) {
                        const dmg = partyDps * 0.1;
                        
                        if (dungeonMode === 'RAID' && raidBoss && raidBoss.active) {
                            setRaidBoss(prev => {
                                if (!prev) return null;
                                const elapsed = Date.now() - prev.start;
                                if (elapsed >= 30000) {
                                    addText(window.innerWidth/2, window.innerHeight/2, "RAID FAILED...", "text-gray-500 font-bold text-3xl");
                                    setDungeonMode('NORMAL');
                                    return null;
                                }
                                const nextHp = prev.hp - dmg;
                                if (nextHp <= 0) {
                                    const reward = Math.floor(prev.maxHp * 0.1 * (1 + artifactEffects.gold) * (1 + masteryEffects.gold));
                                    setGold(g => g + reward);
                                    addText(window.innerWidth/2, window.innerHeight/2, `RAID CLEAR! +${formatNum(reward)}G`, "text-yellow-300 font-bold text-3xl");
                                    setDungeonMode('NORMAL');
                                    return null;
                                }
                                return { ...prev, hp: nextHp, timeLeft: 30000 - elapsed };
                            });
                        } else if (dungeonMode === 'TOWER') {
                            setMobHp(prev => {
                                const next = prev - dmg;
                                if (next <= 0) {
                                    const reward = Math.floor(mobMaxHp * 0.3 * (1 + artifactEffects.gold) * (1 + masteryEffects.gold));
                                    setGold(g => g + reward);
                                    setTowerFloor(f => f + 1);
                                    addText(window.innerWidth/2, window.innerHeight/2, `FLOOR CLEAR! +${formatNum(reward)}G`, "text-purple-300 font-bold text-3xl");
                                    
                                    const nextMax = Math.floor(mobMaxHp * 1.5);
                                    setMobMaxHp(nextMax);
                                    return nextMax;
                                }
                                return next;
                            });
                        } else {
                            // Normal Stage
                            setMobHp(prev => {
                                const next = prev - dmg;
                                if (next <= 0) {
                                    let rewardGold = Math.floor(mobMaxHp * 0.5 * (1 + artifactEffects.gold) * (1 + masteryEffects.gold));
                                    if (activeBuffs.GOLD > Date.now()) rewardGold *= 2;
                                    setGold(g => g + rewardGold);
                                    setStage(s => s + 1);
                                    const nextHp = Math.floor(100 * Math.pow(1.35, stage));
                                    setMobMaxHp(nextHp);
                                    return nextHp;
                                }
                                return next;
                            });
                        }
                    }
                }, 100);
                return () => clearInterval(timer);
            }, [autoLv, clickPower, partyDps, stage, mobMaxHp, artifactEffects, activeBuffs, raidBoss, masteryEffects, dungeonMode, towerFloor]);

            const openItemModal = (item, source = null) => {
                setSelectedItem(item);
                setItemSource(source);
                setIsEquipMode(false);
            };

            return (
                <div className={`w-full h-full flex flex-col relative text-sm transition-colors duration-700
                    ${tab === 'SMITH' ? 'bg-lava-gradient' : tab === 'DUNGEON' ? (dungeonMode === 'TOWER' ? 'bg-tower-gradient' : 'bg-dungeon-gradient') : 'bg-inv-gradient'}
                `}>
                    {/* TOP BAR */}
                    <div className="h-14 px-4 flex items-center justify-between bg-black/80 border-b border-white/10 z-50 shrink-0">
                        <div className="flex gap-2">
                            <div className="flex items-center gap-1 bg-yellow-900/50 px-3 py-1 rounded border border-yellow-500/30">
                                <span>💰</span> <span className="font-bold text-yellow-200 text-lg">{formatNum(gold)}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                             <div className="font-display text-lg text-gray-200 leading-none">
                                {tab === 'SMITH' ? '전설의 대장간' : tab === 'DUNGEON' ? (dungeonMode === 'TOWER' ? `무한의 탑 ${towerFloor}층` : `STAGE ${stage}`) : tab === 'INVENTORY' ? '모험가의 가방' : '상점'}
                            </div>
                            <button onClick={() => setIsSettingsOpen(true)} className="text-2xl text-gray-400 hover:text-white transition-colors">⚙️</button>
                        </div>
                    </div>

                    {/* CONTENT AREA */}
                    <div className="flex-1 overflow-hidden relative flex flex-col">
                        
                        {/* SMITH TAB */}
                        {tab === 'SMITH' && (
                            <div className="flex flex-col h-full items-center justify-center relative p-4">
                                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 pointer-events-none"></div>
                                
                                {!showMastery ? (
                                    <>
                                        <div className="w-full max-w-xs mb-12 relative z-10">
                                            <div className="h-6 bg-gray-800 rounded-full overflow-hidden border-2 border-gray-600 shadow-lg">
                                                <div className="h-full bg-gradient-to-r from-orange-600 via-red-500 to-yellow-400 transition-all duration-100 relative" style={{ width: `${Math.min(100, (smithHp/currentWp.maxHp)*100)}%` }}>
                                                    <div className="absolute inset-0 bg-white/20 animate-pulse"></div>
                                                </div>
                                            </div>
                                            <div className="flex justify-between text-xs font-bold text-gray-300 mt-1 px-2">
                                                <span>{currentWp.name} 단조중</span>
                                                <span>{Math.floor((smithHp/currentWp.maxHp)*100)}%</span>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => hitAnvil(clickPower, false)}
                                            className={`relative w-64 h-64 anvil-anim group transition-all ${shake ? 'shake-anim' : ''}`}
                                        >
                                            <div className="absolute inset-0 bg-orange-500/20 blur-3xl rounded-full group-hover:bg-orange-500/30 transition-all"></div>
                                            <div className="relative w-full h-full flex items-center justify-center">
                                                <div className="text-9xl drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] filter grayscale-[0.3] group-hover:grayscale-0 transition-all transform scale-150">
                                                    {currentWp.icon}
                                                </div>
                                            </div>
                                            <div className="absolute -bottom-10 w-full text-center">
                                                 <span className="bg-black/60 px-3 py-1 rounded-full text-gray-400 text-xs border border-white/10">클릭 파워: {formatNum(clickPower)}</span>
                                            </div>
                                        </button>
                                        
                                        <div className="flex gap-3 mt-20 z-10">
                                            <button onClick={()=>{if(gold>=100*clickLv){setGold(g=>g-100*clickLv);setClickLv(l=>l+1)}}} className="w-20 h-20 glass-panel rounded-xl flex flex-col items-center justify-center btn-press hover:bg-white/5 border-t border-white/10">
                                                <span className="text-2xl mb-1">🔨</span>
                                                <span className="text-[10px] text-gray-400">강화</span>
                                                <span className="font-bold text-xs text-yellow-400">{formatNum(100*clickLv)}</span>
                                            </button>
                                            <button onClick={()=>{if(gold>=500*(autoLv+1)){setGold(g=>g-500*(autoLv+1));setAutoLv(l=>l+1)}}} className="w-20 h-20 glass-panel rounded-xl flex flex-col items-center justify-center btn-press hover:bg-white/5 border-t border-white/10">
                                                <span className="text-2xl mb-1">⚙️</span>
                                                <span className="text-[10px] text-gray-400">자동화</span>
                                                <span className="font-bold text-xs text-yellow-400">{formatNum(500*(autoLv+1))}</span>
                                            </button>
                                            <button onClick={()=>{if(wpIdx<WEAPONS.length-1 && gold>=currentWp.basePrice*10){setGold(g=>g-currentWp.basePrice*10);setWpIdx(i=>i+1);setSmithHp(0)}}} className="w-20 h-20 glass-panel rounded-xl flex flex-col items-center justify-center btn-press hover:bg-white/5 border-t border-white/10">
                                                <span className="text-2xl mb-1">📜</span>
                                                <span className="text-[10px] text-gray-400">도면</span>
                                                <span className="font-bold text-xs text-yellow-400">{wpIdx===WEAPONS.length-1?'MAX':formatNum(currentWp.basePrice*10)}</span>
                                            </button>
                                            <button onClick={() => setShowMastery(true)} className="w-20 h-20 glass-panel rounded-xl flex flex-col items-center justify-center btn-press hover:bg-white/5 border-t border-white/10 bg-blue-900/30">
                                                <span className="text-2xl mb-1">🎓</span>
                                                <span className="text-[10px] text-blue-300">마스터리</span>
                                            </button>
                                        </div>
                                    </>
                                ) : (
                                    <div className="w-full h-full p-4 bg-black/80 backdrop-blur-md flex flex-col">
                                        <div className="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                                            <h2 className="text-xl font-bold text-blue-300">대장장이 마스터리</h2>
                                            <button onClick={() => setShowMastery(false)} className="text-gray-400">닫기</button>
                                        </div>
                                        <div className="space-y-3">
                                            {MASTERY_DEFS.map(m => {
                                                const lv = mastery[m.id];
                                                const cost = Math.floor(m.baseCost * Math.pow(1.5, lv));
                                                return (
                                                    <div key={m.id} className="glass-card p-4 rounded-xl flex items-center justify-between">
                                                        <div className="flex items-center gap-4">
                                                            <div className="text-3xl">{m.icon}</div>
                                                            <div>
                                                                <div className="font-bold text-white">{m.name} <span className="text-blue-400">Lv.{lv}</span></div>
                                                                <div className="text-xs text-gray-400">{m.desc} +{Math.round(lv * m.val * 100)}%</div>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => upgradeMastery(m.id)} className="bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-xs font-bold min-w-[70px]">
                                                            {formatNum(cost)}
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* DUNGEON TAB */}
                        {tab === 'DUNGEON' && (
                            <div className="flex-1 flex flex-col overflow-hidden">
                                <div className="h-64 bg-black relative overflow-hidden border-b border-white/10 shrink-0">
                                    <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')]"></div>
                                    
                                    {dungeonMode === 'RAID' ? (
                                        // RAID BOSS UI
                                        <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/50">
                                            <div className="text-red-500 font-bold text-2xl animate-pulse mb-2">WARNING: BOSS RAID</div>
                                            <div className="text-9xl animate-bounce filter drop-shadow-[0_0_20px_rgba(255,0,0,0.8)]">{BOSS_MONSTERS[0]}</div>
                                            <div className="w-64 h-6 bg-gray-800 rounded-full mt-6 overflow-hidden border border-red-600">
                                                <div className="h-full bg-red-600 transition-all" style={{width: `${(raidBoss.hp/raidBoss.maxHp)*100}%`}}></div>
                                            </div>
                                            <div className="text-xl font-game mt-1 text-white">{formatNum(raidBoss.hp)}</div>
                                            <div className="text-yellow-400 font-bold text-2xl mt-2">{(raidBoss.timeLeft/1000).toFixed(1)}s</div>
                                        </div>
                                    ) : dungeonMode === 'TOWER' ? (
                                        // TOWER UI
                                        <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-purple-900/20">
                                            <div className="text-purple-300 font-bold text-xl mb-2">TOWER FLOOR {towerFloor}</div>
                                            <div className="text-9xl animate-pulse filter drop-shadow-[0_0_15px_rgba(168,85,247,0.5)]">{TOWER_BOSSES[(towerFloor-1)%TOWER_BOSSES.length]}</div>
                                            <div className="w-64 h-6 bg-gray-800 rounded-full mt-6 overflow-hidden border border-purple-500">
                                                <div className="h-full bg-purple-500 transition-all" style={{width: `${(mobHp/mobMaxHp)*100}%`}}></div>
                                            </div>
                                            <div className="text-xl font-game mt-1 text-white">{formatNum(mobHp)}</div>
                                            <button onClick={exitDungeonMode} className="absolute top-2 right-2 bg-gray-800 text-xs px-2 py-1 rounded text-gray-400">나가기</button>
                                        </div>
                                    ) : (
                                        // NORMAL STAGE UI
                                        <div className="absolute top-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
